services:
  db:
    image: postgres:18-alpine
    container_name: db_produtos

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: produtos

    ports:
      - "5433:5432"

    shm_size: 128mb
    restart: always

    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

